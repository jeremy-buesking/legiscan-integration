spring.application.name=LegiTrack

#legiscan.api-key=${LEGISCAN_API_KEY}
legiscan.api-key=51a4bb4c17efec1819b76a3f5ae2adc2
# Claude LLM
anthropic.api-key=${ANTHROPIC_API_KEY}
#anthropic.base-url=https://api.anthropic.com/v1/messages
#anthropic.model=claude-3-5-sonnet-20240620
#anthropic.max-tokens=1024
#anthropic.api-version=2023-06-01

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:legitrack
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (browser-based DB viewer)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console